<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Genetics - Live Simulation</title>
    <style>
        body { 
            background: #121212; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            color: #f1f1f1; 
            margin-bottom: 20px; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #stats-container { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            margin-bottom: 20px; 
            min-width: 600px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .stat-item { font-size: 1.1em; border-bottom: 1px solid #2a2a2a; padding-bottom: 5px; }
        .label { color: #888; font-size: 0.9em; text-transform: uppercase; }
        .value { 
            color: #00ff41; 
            font-weight: bold; 
            font-family: 'Courier New', monospace; 
            float: right;
        }

        canvas { 
            background: #252525; 
            border: 3px solid #333; 
            border-radius: 5px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.4); 
        }

        .controls { 
            margin-top: 25px; 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            width: 100%; 
            max-width: 800px; 
        }
        
        .btn-action {
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            min-width: 180px;
        }

        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.3); }
        .btn-action:active { transform: translateY(2px); box-shadow: 0 0 0 rgba(0,0,0,0.3); }
        .btn-action:disabled { background: #444; cursor: not-allowed; opacity: 0.6; transform: none; box-shadow: none; }

        .btn-red { background: #e10600; }
        .btn-red:hover { background: #ff1e1e; }
        
        .btn-blue { background: #007bff; }
        .btn-blue:hover { background: #0056b3; }
        
        .btn-gray { background: #555; }
        .btn-gray:hover { background: #777; }
    </style>
</head>
<body>
    <h1>LIVE SIMULATION</h1>
    
    <div id="stats-container">
        <div class="stat-item">
            <span class="label">Track:</span> 
            <span class="value" style="color: #ff3e3e;">{{ track.upper() }} GP</span>
        </div>
        <div class="stat-item">
            <span class="label">Population:</span> 
            <span class="value">{{ population }} AGENTS</span>
        </div>
        <div class="stat-item">
            <span class="label">Generation:</span> 
            <span id="gen-count" class="value">1</span>
        </div>
        <div class="stat-item">
            <span class="label">Status:</span> 
            <span id="status" class="value" style="color: #ffcc00;">WAITING...</span>
        </div>
        <div class="stat-item">
            <span class="label">Best Fitness:</span> 
            <span id="best-fitness" class="value">0.00</span>
        </div>
        <div class="stat-item">
            <span class="label">Alive Agents:</span> 
            <span id="alive-count" class="value">{{ population }}</span>
        </div>
    </div>

    <canvas id="simulationCanvas" width="1000" height="700"></canvas>

    <div class="controls">
        <button id="startBtn" class="btn-action btn-red">🚀 START ENGINES</button>
        <button id="resetBtn" class="btn-action btn-gray">🗑️ RESET EVOLUTION</button>
        <button id="nextGenBtn" class="btn-action btn-blue">⏭️ SKIP TO NEXT GEN</button>
        <a href="/" class="btn-action btn-gray" style="min-width: 120px;">⚙️ SETUP</a>
    </div>

    <script>
        window.config = {
            trackName: "{{ track }}",
            popSize: parseInt("{{ population }}")
        };

        const startBtn = document.getElementById('startBtn');
        const statusDisplay = document.getElementById('status');

        // Lee si venimos de un reset o de un salto automático
        window.simulationRunning = localStorage.getItem('simulationRunning') === 'true';

        function activateUI() {
            statusDisplay.innerText = "RUNNING";
            statusDisplay.style.color = "#00ff41";
            startBtn.disabled = true;
            startBtn.innerText = "SYSTEM ACTIVE";
        }

        if (window.simulationRunning) {
            activateUI();
        }

        startBtn.onclick = () => {
            window.simulationRunning = true;
            localStorage.setItem('simulationRunning', 'true'); 
            activateUI();
        };
    </script>

    <script src="{{ url_for('static', filename='js/tracks_data.js') }}"></script>
    <script src="{{ url_for('static', filename='js/network.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sensor.js') }}"></script>
    <script src="{{ url_for('static', filename='js/car.js') }}"></script> 
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
